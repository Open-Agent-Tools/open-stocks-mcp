services:
  open-stocks-mcp:
    # Build the image from the Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    # Tag the built image for easier identification
    image: open-stocks-mcp:latest
    # Name the container for easier identification
    container_name: open-stocks-mcp-server
    # Restart the container automatically if it stops
    restart: unless-stopped
    # Pass environment variables from a .env file in the same directory
    # This is the recommended way to handle sensitive data like credentials
    env_file:
      - .env
    # Map the container's port 3001 to the host's port 3001 (HTTP transport)
    ports:
      - "3001:3001"
    # Health check configuration for HTTP transport
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security configuration
    user: "1001:1001"  # Run as non-root user
    # Resource limits (optional but recommended for production)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # Define the command to run the application
    # This overrides any CMD in the base Dockerfile
    command: >
      open-stocks-mcp-server
      --transport http
      --host 0.0.0.0
      --port 3001
    # Add logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Persistent volumes for session data and logs
    volumes:
      - mcp_tokens:/home/mcp/.tokens
      - mcp_logs:/home/mcp/.local/state/mcp-servers/logs

# Named volumes for persistent data
volumes:
  mcp_tokens:
  mcp_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/logs

# Note:
# Create a .env file in this directory with your credentials:
# ROBINHOOD_USERNAME=your_username
# ROBINHOOD_PASSWORD=your_password
# MCP_API_KEY=<a-long-random-secret>
#
# MCP_API_KEY is REQUIRED when binding to 0.0.0.0 (as this compose file does).
# The MCP HTTP transport will refuse to start without it, since otherwise any
# host reachable on port 3001 could invoke trading tools. Generate one with:
#   python -c "import secrets; print(secrets.token_urlsafe(32))"
# Clients must send `Authorization: Bearer $MCP_API_KEY` on /mcp requests.
#
# Persistent data:
# - mcp_tokens volume (Robinhood session tokens, Docker-managed)
# - ./data/logs/ (Application logs)
# Run `docker-compose down -v` to remove volumes and force re-authentication.
